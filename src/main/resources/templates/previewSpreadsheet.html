<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <link rel="stylesheet" href="/preview-spreadsheet.css">
</head>
<body>
<div class="page">
  <h1>{title}</h1>
  <div class="meta">Excel preview</div>
  {#for sheet in data.sheets}
    <div class="sheet">
      <h2>{sheet.name}</h2>
      <table>
        {#for row in sheet.rows}
          <tr>
            {#for cell in row}
              <td style="{cell.css}">{#if cell.hyperlink}<a href="{cell.hyperlink}" target="_blank" rel="noopener noreferrer">{cell.value}</a>{#else}{cell.value}{/if}</td>
            {/for}
          </tr>
        {/for}
      </table>
      {#for image in sheet.images}
        <img class="sheet-img" alt="Excel image" src="data:image/{image.format};base64,{image.base64Data}">
      {/for}
    </div>
  {/for}
</div>
</body>
</html>
