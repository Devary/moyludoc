<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <link rel="stylesheet" href="/preview-text.css">
</head>
<body>
<div class="page">
  <h1>{title}</h1>
  <div class="meta">{fileTypeLabel} preview</div>
  {#if isHtml}
    {rawBody}
  {#else}
    {#if isMarkdown}
      {rawBody}
    {#else}
      <pre>{body}</pre>
    {/if}
  {/if}
</div>
</body>
</html>
